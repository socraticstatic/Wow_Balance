name: Weekly Data Sync

on:
  schedule:
    # Every Monday at 14:00 UTC (8:00 AM CT)
    - cron: '0 14 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Install app dependencies
      - run: npm ci --legacy-peer-deps

      # Set up the sync scripts
      - name: Install sync script dependencies
        run: |
          mkdir -p /tmp/sync-scripts
          cp -r src/skill-data /tmp/sync-scripts/data
          cat > /tmp/sync-scripts/.env << ENVEOF
          BLIZZARD_CLIENT_ID=${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET=${{ secrets.BLIZZARD_CLIENT_SECRET }}
          WARCRAFTLOGS_CLIENT_ID=${{ secrets.WARCRAFTLOGS_CLIENT_ID }}
          WARCRAFTLOGS_CLIENT_SECRET=${{ secrets.WARCRAFTLOGS_CLIENT_SECRET }}
          ENVEOF

      # Run sync scripts (fetch fresh data from APIs)
      - name: Fetch rankings
        run: |
          cd /tmp/sync-scripts
          npx tsx ${{ github.workspace }}/scripts/fetch-rankings.ts || echo "Rankings fetch failed, using cached data"
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
          WARCRAFTLOGS_CLIENT_ID: ${{ secrets.WARCRAFTLOGS_CLIENT_ID }}
          WARCRAFTLOGS_CLIENT_SECRET: ${{ secrets.WARCRAFTLOGS_CLIENT_SECRET }}
        continue-on-error: true

      - name: Fetch character data
        run: |
          cd /tmp/sync-scripts
          npx tsx ${{ github.workspace }}/scripts/fetch-character.ts Spiracle zuljin us || echo "Character fetch failed, using cached data"
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
          WARCRAFTLOGS_CLIENT_ID: ${{ secrets.WARCRAFTLOGS_CLIENT_ID }}
          WARCRAFTLOGS_CLIENT_SECRET: ${{ secrets.WARCRAFTLOGS_CLIENT_SECRET }}
        continue-on-error: true

      # Copy updated data back to repo
      - name: Update bundled data
        run: |
          if [ -d "/tmp/sync-scripts/data" ]; then
            cp /tmp/sync-scripts/data/*.json src/skill-data/ 2>/dev/null || true
          fi
          # Update meta timestamp
          node -e "
            const fs = require('fs');
            const meta = JSON.parse(fs.readFileSync('src/skill-data/meta.json', 'utf8'));
            meta.lastSynced = new Date().toISOString();
            fs.writeFileSync('src/skill-data/meta.json', JSON.stringify(meta, null, 2));
          "

      # Commit and push if data changed
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/skill-data/
          git diff --staged --quiet || git commit -m "chore: weekly data sync $(date -u +%Y-%m-%d)"
          git push || echo "Nothing to push"
